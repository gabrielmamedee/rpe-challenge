version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rpe-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rpe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rpe-redis
    ports:
      - "6379:6379"
    networks:
      - rpe-network

  mongodb:
    image: mongo:7
    container_name: rpe-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    networks:
      - rpe-network

  localstack:
    image: localstack/localstack:latest
    container_name: rpe-localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - SERVICES=sqs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./scripts/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh
    entrypoint: >
      bash -c "chmod +x /etc/localstack/init/ready.d/init-sqs.sh && exec docker-entrypoint.sh"
    networks:
      - rpe-network

  payment-processor:
    build:
      context: ./payment-processor
      dockerfile: Dockerfile
    container_name: payment-processor
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - mongodb
      - localstack
    networks:
      - rpe-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY=test
      - SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY=test
      - SPRING_CLOUD_AWS_REGION_STATIC=us-east-1
      - SPRING_CLOUD_AWS_ENDPOINT=http://localstack:4566
      - PAYMENT_PROCESSOR_URL=http://payment-processor:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      localstack:
        condition: service_started
      payment-processor:
        condition: service_started
    networks:
      - rpe-network

  order-web:
    build:
      context: ./order-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: order-web
    ports:
      - "3000:80"
    depends_on:
      - order-service
    networks:
      - rpe-network

networks:
  rpe-network:
    driver: bridge

volumes:
  pgdata:
  mongodata: